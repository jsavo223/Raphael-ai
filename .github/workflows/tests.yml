name: Raphael Tests

on:
  workflow_dispatch:
    inputs:
      pytest_target:
        description: "Pytest target to run, such as tests or tests/test_api_ingestion.py"
        required: false
        default: "tests"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTEST_TARGET="${{ github.event.inputs.pytest_target }}"
          if [ -z "$PYTEST_TARGET" ]; then
            PYTEST_TARGET="tests"
          fi
          python -m pytest "$PYTEST_TARGET"
